name: verus

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Rust toolchain
      uses: ./.github/actions/toolchains/rust
      with:
        components: ""
    - name: Cache cargo
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: ${{ runner.os }}-regorus-verus
    - name: Install Verus and run verification
      shell: bash
      run: |
        set -euxo pipefail
        asset_url="$(curl -fsSL https://api.github.com/repos/verus-lang/verus/releases/latest | grep '"browser_download_url":' | cut -d '"' -f 4 | grep -E 'x86-linux\.zip$' | head -n1)"
        test -n "$asset_url"
        curl -fsSL "$asset_url" -o verus.zip
        unzip -q verus.zip -d verus-dist

        verus_bin="$(find verus-dist -type f -name verus -perm -u+x | head -n1)"
        cargo_verus_bin="$(find verus-dist -type f -name cargo-verus -perm -u+x | head -n1)"
        test -n "$verus_bin"
        test -n "$cargo_verus_bin"

        # Put cargo-verus on PATH for the commands below.
        export PATH="$(cd "$(dirname "$verus_bin")" && pwd):$PATH"
        cargo verus --help

        cargo fetch --locked
        cargo verus verify --locked
