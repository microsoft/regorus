# ARM Template Functions Test Suite
# Tests: split, empty, first, last, createArray, startsWith, endsWith,
# int, string, bool.

cases:
  # =========================================================================
  # split(inputString, delimiter)
  # =========================================================================

  - note: fn_split_basic
    policy_rule: |
      {
        "if": {
          "value": "[first(split('a-b-c', '-'))]",
          "equals": "a"
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_split_last_element
    policy_rule: |
      {
        "if": {
          "value": "[last(split('foo/bar/baz', '/'))]",
          "equals": "baz"
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_split_length
    policy_rule: |
      {
        "if": {
          "value": "[length(split('a,b,c,d', ','))]",
          "equals": 4
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_split_no_match_delimiter
    policy_rule: |
      {
        "if": {
          "value": "[length(split('hello', ','))]",
          "equals": 1
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  # =========================================================================
  # empty(item)
  # =========================================================================

  - note: fn_empty_string_true
    policy_rule: |
      {
        "if": {
          "value": "[empty('')]",
          "equals": true
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_empty_string_false
    policy_rule: |
      {
        "if": {
          "value": "[empty('hello')]",
          "equals": false
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_empty_with_parameter_array
    policy_rule: |
      {
        "if": {
          "value": "[empty(parameters('items'))]",
          "equals": true
        },
        "then": { "effect": "deny" }
      }
    parameters:
      items: []
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_empty_nonempty_array
    policy_rule: |
      {
        "if": {
          "value": "[empty(parameters('items'))]",
          "equals": false
        },
        "then": { "effect": "deny" }
      }
    parameters:
      items:
        - "a"
    resource:
      type: "any"
    want_effect: "deny"

  # =========================================================================
  # first(arg) / last(arg)
  # =========================================================================

  - note: fn_first_string
    policy_rule: |
      {
        "if": {
          "value": "[first('hello')]",
          "equals": "h"
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_last_string
    policy_rule: |
      {
        "if": {
          "value": "[last('hello')]",
          "equals": "o"
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_first_array
    policy_rule: |
      {
        "if": {
          "value": "[first(parameters('items'))]",
          "equals": "alpha"
        },
        "then": { "effect": "deny" }
      }
    parameters:
      items:
        - "alpha"
        - "beta"
        - "gamma"
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_last_array
    policy_rule: |
      {
        "if": {
          "value": "[last(parameters('items'))]",
          "equals": "gamma"
        },
        "then": { "effect": "deny" }
      }
    parameters:
      items:
        - "alpha"
        - "beta"
        - "gamma"
    resource:
      type: "any"
    want_effect: "deny"

  # =========================================================================
  # createArray(items...)
  # =========================================================================

  - note: fn_createArray_basic
    policy_rule: |
      {
        "if": {
          "value": "[length(createArray('a', 'b', 'c'))]",
          "equals": 3
