        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_startsWith_false
    policy_rule: |
      {
        "if": {
          "value": "[startsWith('abcdef', 'xyz')]",
          "equals": false
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_startsWith_case_insensitive
    policy_rule: |
      {
        "if": {
          "value": "[startsWith('AbCdEf', 'abc')]",
          "equals": true
