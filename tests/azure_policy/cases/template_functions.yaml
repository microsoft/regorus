        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_createArray_first
    policy_rule: |
      {
        "if": {
          "value": "[first(createArray('x', 'y'))]",
          "equals": "x"
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  # =========================================================================
  # startsWith / endsWith
  # =========================================================================

  - note: fn_startsWith_true
    policy_rule: |
      {
        "if": {
          "value": "[startsWith('abcdef', 'abc')]",
          "equals": true
