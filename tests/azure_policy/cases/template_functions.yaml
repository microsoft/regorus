    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_endsWith_true
    policy_rule: |
      {
        "if": {
          "value": "[endsWith('abcdef', 'def')]",
          "equals": true
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_endsWith_false
    policy_rule: |
      {
        "if": {
          "value": "[endsWith('abcdef', 'xyz')]",
          "equals": false
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_endsWith_case_insensitive
    policy_rule: |
      {
        "if": {
          "value": "[endsWith('AbCdEf', 'DEF')]",
          "equals": true
        },
        "then": { "effect": "deny" }
      }
    resource:
      type: "any"
    want_effect: "deny"

  - note: fn_startsWith_field_value
    policy_rule: |
      {
        "if": {
          "value": "[startsWith(field('name'), 'test-')]",
          "equals": true
        },
        "then": { "effect": "deny" }
      }
    resource:
      name: "test-resource"
    want_effect: "deny"

