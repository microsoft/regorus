cases:
  # =========================================================================
  # DINE — Windows VM in supported region, matching publisher
  # =========================================================================

  - note: dine_windows_vm_canonical
    resource:
      type: "Microsoft.Compute/virtualMachines"
      name: "win-vm-01"
      id: "/subscriptions/sub1/resourceGroups/rg1/providers/Microsoft.Compute/virtualMachines/win-vm-01"
      location: "eastus"
      properties:
        storageProfile:
          imageReference:
            publisher: "MicrosoftWindowsServer"
            offer: "WindowsServer"
            sku: "2019-Datacenter"
          osDisk:
            osType: "Windows"
        osProfile:
          windowsConfiguration: {}
    host_await:
      - key:
          operation: "lookup_related_resources"
          type: "Microsoft.Automanage/configurationProfileAssignments"
          name: "default"
        response: null
    want_effect: "DeployIfNotExists"

  # =========================================================================
  # Pass — VM in unsupported region
  # =========================================================================

  - note: pass_unsupported_region
    resource:
      type: "Microsoft.Compute/virtualMachines"
      name: "vm-brazil"
      location: "brazilsoutheast"
      properties:
        storageProfile:
          imageReference:
            publisher: "MicrosoftWindowsServer"
            offer: "WindowsServer"
            sku: "2019-Datacenter"
          osDisk:
            osType: "Windows"
        osProfile:
          windowsConfiguration: {}
    want_undefined: true

  # =========================================================================
  # DINE — Linux VM with Canonical publisher
  # =========================================================================

  - note: dine_linux_vm_canonical
    resource:
      type: "Microsoft.Compute/virtualMachines"
      name: "linux-vm-01"
      id: "/subscriptions/sub1/resourceGroups/rg1/providers/Microsoft.Compute/virtualMachines/linux-vm-01"
      location: "westus2"
      properties:
        storageProfile:
          imageReference:
            publisher: "Canonical"
            offer: "UbuntuServer"
            sku: "18.04-LTS"
          osDisk:
            osType: "Linux"
        osProfile:
          linuxConfiguration: {}
    host_await:
      - key:
          operation: "lookup_related_resources"
          type: "Microsoft.Automanage/configurationProfileAssignments"
          name: "default"
        response: null
    want_effect: "DeployIfNotExists"

  # =========================================================================
  # Pass — VM with tag filter that doesn't match
  # =========================================================================

  - note: pass_tag_filter_no_match
    resource:
      type: "Microsoft.Compute/virtualMachines"
      name: "vm-tagged"
      location: "eastus"
      tags:
        env: "dev"
      properties:
        storageProfile:
          imageReference:
            publisher: "MicrosoftWindowsServer"
            offer: "WindowsServer"
            sku: "2019-Datacenter"
          osDisk:
            osType: "Windows"
        osProfile:
          windowsConfiguration: {}
    parameters:
      inclusionTagName: "env"
      inclusionTagValues:
        - "prod"
    want_undefined: true

  # =========================================================================
  # Skip — Wrong resource type
  # =========================================================================

  - note: skip_wrong_type
    resource:
      type: "Microsoft.Storage/storageAccounts"
      name: "storageacct1"
      location: "eastus"
      properties: {}
    want_undefined: true

  # =========================================================================
  # Pass — VM with unsupported publisher (not in any publisher allowlist)
  # =========================================================================

  - note: pass_unsupported_publisher
    resource:
      type: "Microsoft.Compute/virtualMachines"
      name: "vm-unknown-pub"
      id: "/subscriptions/sub1/resourceGroups/rg1/providers/Microsoft.Compute/virtualMachines/vm-unknown-pub"
      location: "eastus"
      properties:
        storageProfile:
          imageReference:
            publisher: "unknown-vendor"
            offer: "some-offer"
            sku: "some-sku"
          osDisk:
            osType: "Linux"
        osProfile:
          linuxConfiguration: {}
    want_undefined: true
