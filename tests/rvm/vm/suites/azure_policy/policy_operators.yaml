  # =========================================================================
  # PolicyExists
  # =========================================================================

  - note: policy_exists_true_defined
    description: "Defined non-null value, expected=true → true"
    literals: ["hello", "true"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_exists_false_undefined
    description: "Undefined value, expected=true → false"
    literals: ["true"]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_exists_false_null
    description: "Null value, expected=true → false (null treated as not-exists)"
    literals: ["true"]
    instructions:
      - "LoadNull { dest: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_exists_not_expected_undefined
    description: "Undefined value, expected=false → true (field doesn't exist, as expected)"
    literals: ["false"]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_exists_not_expected_defined
    description: "Defined value, expected=false → false (field exists, but we expected it not to)"
    literals: ["hello", "false"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_exists_bool_true
    description: "expected as bool true"
    literals: ["hello"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "LoadTrue { dest: 2 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  # =========================================================================
  # PolicyNot — !is_true(operand)
  # =========================================================================

  - note: policy_not_true
    literals: []
