  - note: policy_not_in_no_match
    description: "value NOT in array → true"
    literals: ["foo", ["Hello", "World"]]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
