  - note: policy_greater_or_equals_less
    literals: [3, 5]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyGreaterOrEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_less_true
    literals: [3, 10]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyLess { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_less_false
    literals: [10, 3]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyLess { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_less_or_equals_equal
    literals: [5, 5]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyLessOrEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_less_or_equals_greater
    literals: [10, 5]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyLessOrEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_greater_string_number_coercion
    description: "String '10' > number 5 via coercion"
    literals: ["10", 5]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
