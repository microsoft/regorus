  - note: policy_not_equals_undefined_left
    description: "undefined field → true (field doesn't exist, so not equal)"
    literals: ["hello"]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_not_equals_undefined_vs_null
    description: "undefined LHS + null RHS → false (missing field sentinel)"
    literals: []
    instructions:
      - "LoadNull { dest: 2 }"
      - "PolicyNotEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_not_equals_case_insensitive
    literals: ["Hello", "hELLO"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyNotEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

