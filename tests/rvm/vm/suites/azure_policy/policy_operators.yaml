  - note: policy_greater_or_equals_true
    literals: [5, 5]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyGreaterOrEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
