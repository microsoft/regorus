      - "Return { value: 0 }"
    want_result: false

  - note: policy_exists_bool_false_undefined
    description: "undefined value, expected=false → is_defined=false == expected=false → true"
    literals: []
    instructions:
      - "LoadFalse { dest: 2 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_exists_non_bool_right
    description: "right is number → as_boolish returns None → expected=false"
    literals: [42, "hello"]
    instructions:
      - "Load { dest: 1, literal_idx: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyExists { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  # =========================================================================
  # Edge cases — PolicyIn/PolicyNotIn with scalar RHS, null LHS, null sentinel
  # =========================================================================

  - note: policy_in_scalar_rhs_match
    description: "scalar RHS is treated as single-element collection — matching value → true"
    literals: ["hello", "HELLO"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_in_null_lhs
    description: "explicit null LHS always returns false (null is a sentinel, not a matchable value)"
    literals: [["hello", null]]
    instructions:
      - "LoadNull { dest: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_not_in_null_lhs
    description: "explicit null LHS — notIn always returns true"
    literals: [["hello", null]]
    instructions:
      - "LoadNull { dest: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_in_null_lhs_null_only_array
    description: "null LHS against [null] — null-as-defined doesn't match null-as-sentinel"
    literals: [[null]]
    instructions:
      - "LoadNull { dest: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_not_in_null_lhs_null_only_array
    description: "null LHS against [null] — notIn always true for null-as-defined"
    literals: [[null]]
    instructions:
      - "LoadNull { dest: 1 }"
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_in_rhs_array_with_null_sentinel
    description: "non-null LHS, RHS array has null sentinel — null is skipped, no match"
    literals: ["hello", [null, "world"]]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_in_undefined_lhs_null_sentinel
    description: "undefined LHS, RHS array has null sentinel → true (null means 'match missing')"
    literals: [[null, "world"]]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_not_in_undefined_lhs_null_sentinel
    description: "undefined LHS, RHS array has null sentinel → false (null matches missing)"
    literals: [[null, "world"]]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_in_undefined_lhs_no_null_sentinel
    description: "undefined LHS, RHS array has no null → false (no sentinel match)"
    literals: [["hello", "world"]]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

