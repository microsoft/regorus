  - note: policy_not_contains_key_undefined
    description: "undefined field → true"
    literals: ["name"]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotContainsKey { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

