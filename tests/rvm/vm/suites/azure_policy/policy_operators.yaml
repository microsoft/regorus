# Azure Policy condition operator instruction tests
#
# Tests for all 20 condition operators + PolicyNot, including
# ValueConditionGuard short-circuit behavior.
# Each operator implements Azure Policy semantics (case-insensitive,
# type coercion, undefined-as-missing-field behavior).

cases:
  # =========================================================================
  # ValueConditionGuard — short-circuit on undefined value
  # =========================================================================

  - note: value_condition_guard_undefined_value
    description: "undefined value register → dest=false (short-circuit)"
    literals: []
    instructions:
      - "LoadTrue { dest: 2 }"
      - "ValueConditionGuard { dest: 0, value: 1, condition: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: value_condition_guard_defined_value
    description: "defined value register → dest copies condition register"
    literals: ["hello"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "LoadTrue { dest: 2 }"
      - "ValueConditionGuard { dest: 0, value: 1, condition: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: value_condition_guard_defined_value_false_condition
    description: "defined value register, false condition → dest=false"
    literals: ["hello"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "LoadFalse { dest: 2 }"
      - "ValueConditionGuard { dest: 0, value: 1, condition: 2 }"
      - "Return { value: 0 }"
    want_result: false

  # =========================================================================
  # PolicyEquals — case-insensitive equality with type coercion
  # =========================================================================

  - note: policy_equals_same_strings
    literals: ["hello", "hello"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_case_insensitive
    literals: ["Hello", "hELLO"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_different_strings
    literals: ["hello", "world"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_equals_numbers
    literals: [42, 42]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_string_number_coercion
    description: String "42" should equal number 42 via type coercion
    literals: ["42", 42]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_booleans
    literals: [true, true]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_undefined_left
    description: undefined left operand returns false
    literals: ["hello"]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_equals_null_values
    literals: []
    instructions:
      - "LoadNull { dest: 1 }"
      - "LoadNull { dest: 2 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  - note: policy_equals_undefined_vs_null
    description: "undefined LHS + null RHS → true (missing field sentinel)"
    literals: []
    instructions:
      - "LoadNull { dest: 2 }"
      - "PolicyEquals { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

  # =========================================================================
  # PolicyNotEquals — undefined field → true, else negated CI equality
  # =========================================================================

  - note: policy_not_equals_same_strings
