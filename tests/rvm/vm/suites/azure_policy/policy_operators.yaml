      - "Return { value: 0 }"
    want_result: true

  - note: policy_in_array_no_match
    literals: ["foo", ["Hello", "World"]]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_in_undefined_left
    literals: [["Hello"]]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_in_not_array
    description: "scalar right operand is treated as singleton; non-matching value → false"
    literals: ["hello", "world"]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: false

  - note: policy_not_in_match
    description: "value IS in array → false"
    literals: ["hello", ["Hello", "World"]]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
      - "PolicyNotIn { dest: 0, left: 1, right: 2 }"
