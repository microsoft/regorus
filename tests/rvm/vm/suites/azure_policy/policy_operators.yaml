  # =========================================================================
  # PolicyIn / PolicyNotIn — CI array/set membership
  # =========================================================================

  - note: policy_in_array_match
    literals: ["hello", ["Hello", "World"]]
    instructions:
      - "Load { dest: 1, literal_idx: 0 }"
      - "Load { dest: 2, literal_idx: 1 }"
