      - "Return { value: 0 }"
    want_result: true

  - note: policy_not_in_undefined_left
    description: "undefined field → true"
    literals: [["Hello"]]
    instructions:
      - "Load { dest: 2, literal_idx: 0 }"
      - "PolicyNotIn { dest: 0, left: 1, right: 2 }"
      - "Return { value: 0 }"
    want_result: true

