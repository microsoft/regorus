# Tests for azure.policy.fn.unique_string
# unique_string() is deterministic (SHA-1 based, 13-char base32 output).
builtin: azure.policy.fn.unique_string

cases:
  - note: unique_string_single_arg
    args: ["hello"]
    want: "kv5ggdxoml2fc"

  - note: unique_string_two_args
    args: ["base1", "base2"]
    want: "njcza7gwdzicb"

  - note: unique_string_deterministic
    args: ["hello"]
    want: "kv5ggdxoml2fc"

  - note: unique_string_no_args
    args: []
    want_undefined: true
