cases:
  - note: forward-ref
    data: {}
    modules:
      - |
        package test
        a = b
        b = 5
    query: data.test
    want_result:
      a: 5
      b: 5

  - note: recursive
    data: {}
    modules:
      - |
        package test
        a = b
        b = c
        c = a
    query: data.test
    error: recursion detected

  - note: cross-module
    data: {}
    modules:
      - |
        package a
        x = data.b.y * 2
      - |
        package b
        y = 10
        z = data.a.x + 5
    query: data
    want_result:
      a:
        x: 20
      b:
        y: 10
        z: 25

  # https://github.com/microsoft/regorus/issues/743
  # Non-cyclic rules across cyclically referencing packages must not be
  # reported as recursion.
  - note: cross-module-non-cyclic-rules
    data: {}
    modules:
      - |
        package registry
        import rego.v1
        allow if allow_stage2
        allow_stage1 if data.registry.packages[_].allow_stage1
        allow_stage2 if data.registry.packages[_].allow_stage2
      - |
        package registry.packages.package_a
        import data.registry
        import rego.v1
        allow_stage2 if registry.allow_stage1
        allow_stage1 := true
    query: data
    want_result:
      registry:
        allow: true
        allow_stage1: true
        allow_stage2: true
        packages:
          package_a:
            allow_stage1: true
            allow_stage2: true

  # Same as above but without the import alias.
  - note: cross-module-non-cyclic-rules-no-import
    data: {}
    modules:
      - |
        package registry
        import rego.v1
        allow if allow_stage2
        allow_stage1 if data.registry.packages[_].allow_stage1
        allow_stage2 if data.registry.packages[_].allow_stage2
      - |
        package registry.packages.package_a
        import rego.v1
        allow_stage2 if data.registry.allow_stage1
        allow_stage1 := true
    query: data
    want_result:
      registry:
        allow: true
        allow_stage1: true
        allow_stage2: true
        packages:
          package_a:
            allow_stage1: true
            allow_stage2: true

  # A genuine cycle at package granularity: q.trigger depends on all of
  # data.p (including p.a), and p.a depends on q.trigger. OPA rejects this
  # statically; regorus detects it via the partial-sweep consistency check.
  - note: cross-module-package-cycle
    data: {}
    modules:
      - |
        package p
        import rego.v1
        a if data.q.trigger >= 0
      - |
        package q
        import rego.v1
        trigger := count(data.p)
    query: data
    error: recursion detected

  # Genuine package-granularity cycle where the reader's body would no longer
  # succeed once the package is fully materialized ("vanishing value").
  - note: cross-module-package-cycle-vanishing
    data: {}
    modules:
      - |
        package p
        import rego.v1
        a if data.q.trigger
      - |
        package q
        import rego.v1
        trigger if count(data.p) == 0
    query: data
    error: recursion detected

  - note: inter
    data: {}
    modules:
      - |
        package test
        a.b.c = 1
        a.b.d = a.b.e
        a.b.e = a.b.c
    query: data.test
    want_result:
      a:
        b:
          c: 1
          d: 1
          e: 1
