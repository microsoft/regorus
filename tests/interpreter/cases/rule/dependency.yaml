cases:
  - note: forward-ref
    data: {}
    modules:
      - |
        package test
        a = b
        b = 5
    query: data.test
    want_result:
      a: 5
      b: 5

  - note: recursive
    data: {}
    modules:
      - |
        package test
        a = b
        b = c
        c = a
    query: data.test
    error: recursion detected

  - note: cross-module
    data: {}
    modules:
      - |
        package a
        x = data.b.y * 2
      - |
        package b
        y = 10
        z = data.a.x + 5
    query: data
    want_result:
      a:
        x: 20
      b:
        y: 10
        z: 25

  # https://github.com/microsoft/regorus/issues/743
  # Non-cyclic rules across cyclically referencing packages must not be
  # reported as recursion.
  - note: cross-module-non-cyclic-rules
    data: {}
    modules:
      - |
        package registry
        import rego.v1
        allow if allow_stage2
        allow_stage1 if data.registry.packages[_].allow_stage1
        allow_stage2 if data.registry.packages[_].allow_stage2
      - |
        package registry.packages.package_a
        import data.registry
        import rego.v1
        allow_stage2 if registry.allow_stage1
        allow_stage1 := true
    query: data
    want_result:
      registry:
        allow: true
        allow_stage1: true
        allow_stage2: true
        packages:
          package_a:
            allow_stage1: true
            allow_stage2: true

  # Same as above but without the import alias.
  - note: cross-module-non-cyclic-rules-no-import
    data: {}
    modules:
      - |
        package registry
        import rego.v1
        allow if allow_stage2
        allow_stage1 if data.registry.packages[_].allow_stage1
        allow_stage2 if data.registry.packages[_].allow_stage2
      - |
        package registry.packages.package_a
        import rego.v1
        allow_stage2 if data.registry.allow_stage1
        allow_stage1 := true
    query: data
    want_result:
      registry:
        allow: true
        allow_stage1: true
        allow_stage2: true
        packages:
          package_a:
            allow_stage1: true
            allow_stage2: true

  - note: inter
    data: {}
    modules:
      - |
        package test
        a.b.c = 1
        a.b.d = a.b.e
        a.b.e = a.b.c
    query: data.test
    want_result:
      a:
        b:
          c: 1
          d: 1
          e: 1
